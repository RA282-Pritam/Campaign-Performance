<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Dashboard | Premium Theme</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    
    <style>
        :root { 
            --bg-body: #f1f5f9; 
            --brand-blue: #2563eb; 
            --dark-header: #334155; 
            --border-color: #cbd5e1; 
        }
        
        body { background-color: var(--bg-body); font-family: 'Inter', sans-serif; padding: 20px; color: #1e293b; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; background: #fff; padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .top-bar h4 { font-weight: 800; font-size: 18px; color: var(--dark-header); margin: 0; text-transform: uppercase; letter-spacing: 1px; }

        .action-group { display: flex; gap: 10px; align-items: center; }
        .upload-card { background: #f8fafc; padding: 5px 12px; border-radius: 8px; border: 1px dashed var(--brand-blue); display: flex; align-items: center; gap: 8px; }
        
        .btn-clear { background: #fff; border: 1px solid #fecaca; color: #dc2626; font-size: 11px; padding: 8px 15px; border-radius: 8px; font-weight: 600; transition: 0.2s; }
        .btn-clear:hover { background: #fee2e2; }

        /* SLICER GRID - Changed to 3 columns to accommodate 6 filters nicely */
        .slicer-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        
        .slicer-card { 
            background: #fff; 
            border-radius: 10px; 
            border: 1px solid var(--border-color); 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            overflow: hidden; 
            display: flex;
            flex-direction: column;
        }

        .slicer-header { 
            background: var(--dark-header); 
            color: #fff; 
            font-size: 10px; 
            font-weight: 700; 
            text-transform: uppercase; 
            padding: 10px 15px; 
            letter-spacing: 1px;
        }

        .slicer-body { padding: 12px; display: flex; flex-wrap: wrap; gap: 6px; max-height: 120px; overflow-y: auto; }
        
        .btn-slicer { 
            border: 1px solid #e2e8f0; 
            background: #f8fafc; 
            font-size: 10px; 
            padding: 4px 12px; 
            border-radius: 50px; 
            color: #475569; 
            font-weight: 600; 
            transition: 0.2s; 
        }
        
        .btn-slicer:hover { border-color: var(--brand-blue); background: #fff; color: var(--brand-blue); }
        .btn-slicer.active { background: var(--brand-blue) !important; color: #fff !important; border-color: var(--brand-blue) !important; }

        /* TABLE STYLING */
        .table-container { background: #fff; border-radius: 12px; border: 1px solid var(--border-color); box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; }
        table.dataTable { border-collapse: collapse !important; width: 100% !important; }
        table.dataTable thead th { background: var(--dark-header) !important; color: #fff !important; font-size: 10px; padding: 12px !important; border: 1px solid #475569 !important; }
        table.dataTable tbody td { padding: 10px 12px !important; font-size: 11px; border: 1px solid var(--border-color) !important; color: #334155; }
        
        /* STATUS BADGES */
        .badge-pill { padding: 4px 10px; border-radius: 6px; font-size: 9px; font-weight: 800; display: inline-block; text-align: center; min-width: 80px; text-transform: uppercase; }
        .status-ok { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .status-high { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .qual-good { background: #166534; color: #fff; }
        .qual-ok { background: #dcfce7; color: #166534; }
        .qual-low { background: #ef4444; color: #fff; }
        .campaign-link { color: var(--brand-blue); font-weight: 700; text-decoration: none; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="top-bar">
        <h4>AURUM ANALYTICA DASHBOARD</h4>
        <div class="action-group">
            <button class="btn-clear" onclick="clearData()">🗑 CLEAR DATA</button>
            <div class="upload-card">
                <input type="file" id="excelUpload" class="form-control form-control-sm" accept=".xlsx, .xls, .csv" style="width: 180px;">
            </div>
        </div>
    </div>

    <!-- 6 BOX SLICER GRID -->
    <div class="slicer-grid">
        <div class="slicer-card">
            <div class="slicer-header">1. TL Name (Filter)</div>
            <div id="filter-tl" class="slicer-body"></div>
        </div>
        <div class="slicer-card">
            <div class="slicer-header">2. Assigned User (FOS)</div>
            <div id="filter-user" class="slicer-body"></div>
        </div>
        <div class="slicer-card">
            <div class="slicer-header">Platform</div>
            <div id="filter-platform" class="slicer-body"></div>
        </div>
        <div class="slicer-card">
            <div class="slicer-header">CPL Status</div>
            <div id="filter-cpl" class="slicer-body"></div>
        </div>
        <div class="slicer-card">
            <div class="slicer-header">Qual Status</div>
            <div id="filter-qual" class="slicer-body"></div>
        </div>
        <div class="slicer-card">
            <div class="slicer-header">Spent Type</div>
            <div id="filter-spent" class="slicer-body"></div>
        </div>
    </div>

    <div class="table-container">
        <div class="table-responsive">
            <table id="campaignTable" class="table table-striped w-100">
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>
let table;
let masterData = [];
let tlUserMap = {}; // Logic for Dependent Dropdown

const targetHeaders = ["DRR", "CAMPAIGN", "CLIENT NAME", "PROJECT NAME", "PLATFORM", "CPL STATUS", "QUALIFICATION STATUS", "CREDIT ASSIGNED", "TOTAL CREDIT SPENT", "CREDIT ASSIGNED FOR", "LEADS DELIVERED", "PENDING LEADS", "FEEDBACK RECEIVED", "LEADS QUALIFIED", "TARGET CPL", "CURRENT CPL", "QUALIFICAITON", "SPENT TYPE", "ASSIGNED USER", "TL NAME"];

$(document).ready(function() {
    $('#tableHead').html("<tr>" + targetHeaders.map(h => `<th>${h}</th>`).join('') + "</tr>");
    
    table = $('#campaignTable').DataTable({
        "dom": 'frtip', 
        "pageLength": 15,
        "language": { "search": "", "searchPlaceholder": "Quick Search..." },
        "createdRow": function(row, data) {
            if (data[1]) {
                const link = `https://leadmanager.automateleads.ai/page/campaign-details/${data[1]}`;
                $('td:eq(1)', row).html(`<a href="${link}" target="_blank" class="campaign-link">${data[1]}</a>`);
            }
            if (data[5]) {
                let s = data[5].toString().toUpperCase();
                if (s.includes("OK")) $('td:eq(5)', row).html(`<span class="badge-pill status-ok">${s}</span>`);
                else if (s.includes("HIGH")) $('td:eq(5)', row).html(`<span class="badge-pill status-high">${s}</span>`);
            }
            if (data[6]) {
                let q = data[6].toString().toUpperCase();
                let cls = q === "GOOD" ? "qual-good" : (q === "OK" ? "qual-ok" : (q === "LOW" ? "qual-low" : ""));
                if(cls) $('td:eq(6)', row).html(`<span class="badge-pill ${cls}">${q}</span>`);
            }
        }
    });

    loadStoredData();
    document.getElementById('excelUpload').addEventListener('change', handleFile, false);
});

function handleFile(e) {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = function(event) {
        const data = new Uint8Array(event.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        masterData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });
        localStorage.setItem('dashboard_data', JSON.stringify(masterData));
        processData(masterData);
    };
    reader.readAsArrayBuffer(file);
}

function loadStoredData() {
    const saved = localStorage.getItem('dashboard_data');
    if (saved) {
        masterData = JSON.parse(saved);
        processData(masterData);
    }
}

function processData(dataRows) {
    const tableData = [];
    const platforms = new Set();
    const cplStatus = new Set();
    const qualStatus = new Set();
    const spentType = new Set();
    const tls = new Set();
    tlUserMap = {}; 

    for(let i = 1; i < dataRows.length; i++) {
        const row = dataRows[i];
        if(row && row.length > 0) {
            tableData.push(row);
            if(row[4]) platforms.add(row[4]);
            if(row[5]) cplStatus.add(row[5]);
            if(row[6]) qualStatus.add(row[6]);
            if(row[17]) spentType.add(row[17]);
            
            // TL & User Mapping
            let user = row[18] || "Unassigned";
            let tl = row[19] || "No TL";
            tls.add(tl);
            if(!tlUserMap[tl]) tlUserMap[tl] = new Set();
            tlUserMap[tl].add(user);
        }
    }

    table.clear().rows.add(tableData).draw();
    
    updateSlicer('filter-platform', 4, platforms);
    updateSlicer('filter-cpl', 5, cplStatus);
    updateSlicer('filter-qual', 6, qualStatus);
    updateSlicer('filter-spent', 17, spentType);
    
    // Initial TL Slicer
    updateTLSlicer(tls);
    // Initial User Slicer (All)
    updateUserSlicer(null);
}

function updateTLSlicer(tlSet) {
    let html = `<button class="btn btn-slicer active" onclick="filterTL(this, '')">All TLs</button>`;
    Array.from(tlSet).sort().forEach(tl => {
        html += `<button class="btn btn-slicer" onclick="filterTL(this, '${tl}')">${tl}</button>`;
    });
    document.getElementById('filter-tl').innerHTML = html;
}

function updateUserSlicer(selectedTL) {
    let users = new Set();
    if(selectedTL) {
        users = tlUserMap[selectedTL];
    } else {
        Object.values(tlUserMap).forEach(uSet => uSet.forEach(u => users.add(u)));
    }

    let html = `<button class="btn btn-slicer active" onclick="filterCol(this, 18, '')">All Users</button>`;
    Array.from(users).sort().forEach(u => {
        html += `<button class="btn btn-slicer" onclick="filterCol(this, 18, '${u}')">${u}</button>`;
    });
    document.getElementById('filter-user').innerHTML = html;
}

function filterTL(btn, tlValue) {
    $(btn).parent().find('.btn-slicer').removeClass('active');
    $(btn).addClass('active');

    // Filter TL column (Index 19)
    table.column(19).search(tlValue ? `^${tlValue}$` : '', true, false);
    
    // Reset User filter when TL changes
    table.column(18).search('').draw();
    
    // Update User Slicer Buttons
    updateUserSlicer(tlValue);
}

function updateSlicer(containerId, colIdx, valueSet) {
    let html = `<button class="btn btn-slicer active" onclick="filterCol(this, ${colIdx}, '')">All</button>`;
    Array.from(valueSet).sort().forEach(val => {
        html += `<button class="btn btn-slicer" onclick="filterCol(this, ${colIdx}, '${val}')">${val}</button>`;
    });
    document.getElementById(containerId).innerHTML = html;
}

function filterCol(btn, idx, val) {
    $(btn).parent().find('.btn-slicer').removeClass('active');
    $(btn).addClass('active');
    table.column(idx).search(val ? `^${val}$` : '', true, false).draw();
}

function clearData() {
    if(confirm("Clear all data?")) {
        localStorage.removeItem('dashboard_data');
        location.reload();
    }
}
</script>
</body>
</html>
