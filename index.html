<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Dashboard | Premium Theme</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    
    <style>
        :root { 
            --bg-body: #f1f5f9; 
            --brand-blue: #2563eb; 
            --dark-header: #334155; /* Table header color */
            --border-color: #cbd5e1; 
        }
        
        body { background-color: var(--bg-body); font-family: 'Inter', sans-serif; padding: 20px; color: #1e293b; }
        
        /* TOP BAR */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; background: #fff; padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .top-bar h4 { font-weight: 800; font-size: 18px; color: var(--dark-header); margin: 0; text-transform: uppercase; letter-spacing: 1px; }

        .action-group { display: flex; gap: 10px; align-items: center; }
        .upload-card { background: #f8fafc; padding: 5px 12px; border-radius: 8px; border: 1px dashed var(--brand-blue); display: flex; align-items: center; gap: 8px; }
        
        .btn-clear { background: #fff; border: 1px solid #fecaca; color: #dc2626; font-size: 11px; padding: 8px 15px; border-radius: 8px; font-weight: 600; transition: 0.2s; }
        .btn-clear:hover { background: #fee2e2; }

        /* PREMIUM SLICER DESIGN (Matching Table) */
        .slicer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
        
        .slicer-card { 
            background: #fff; 
            border-radius: 10px; 
            border: 1px solid var(--border-color); 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            overflow: hidden; /* For header background to fit */
            display: flex;
            flex-direction: column;
        }

        .slicer-header { 
            background: var(--dark-header); 
            color: #fff; 
            font-size: 10px; 
            font-weight: 700; 
            text-transform: uppercase; 
            padding: 10px 15px; 
            letter-spacing: 1px;
            border-bottom: 1px solid var(--dark-header);
        }

        .slicer-body { padding: 12px; display: flex; flex-wrap: wrap; gap: 6px; }
        
        /* PILL BUTTONS */
        .btn-slicer { 
            border: 1px solid #e2e8f0; 
            background: #f8fafc; 
            font-size: 10px; 
            padding: 5px 14px; 
            border-radius: 50px; 
            color: #475569; 
            font-weight: 600; 
            transition: 0.2s; 
        }
        
        .btn-slicer:hover { border-color: var(--brand-blue); background: #fff; color: var(--brand-blue); }

        .btn-slicer.active { 
            background: var(--brand-blue) !important; 
            color: #fff !important; 
            border-color: var(--brand-blue) !important; 
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.3);
        }

        /* TABLE STYLING - FULLY BORDERED */
        .table-container { background: #fff; border-radius: 12px; border: 1px solid var(--border-color); box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; }
        
        table.dataTable { border-collapse: collapse !important; border: 1px solid var(--border-color) !important; width: 100% !important; }
        table.dataTable thead th { background: var(--dark-header) !important; color: #fff !important; font-weight: 600; text-transform: uppercase; font-size: 10px; padding: 14px 15px !important; border: 1px solid #475569 !important; }
        
        table.dataTable tbody td { 
            padding: 12px 15px !important; 
            font-size: 12px; 
            font-weight: 500; 
            border: 1px solid var(--border-color) !important; 
            white-space: nowrap; 
            color: #334155;
        }
        
        table.dataTable tbody tr:nth-child(even) { background-color: #f8fafc; }
        table.dataTable tbody tr:hover { background-color: #f0f4f8; }

        /* STATUS BADGES */
        .badge-pill { padding: 5px 12px; border-radius: 6px; font-size: 10px; font-weight: 800; display: inline-block; text-align: center; min-width: 90px; text-transform: uppercase; }
        
        .status-ok { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .status-high { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        
        .qual-good { background: #166534; color: #fff; box-shadow: 0 2px 4px rgba(22, 101, 52, 0.2); }
        .qual-ok { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .qual-low { background: #ef4444; color: #fff; box-shadow: 0 2px 4px rgba(239, 68, 68, 0.2); }
        .qual-none { background: #f1f5f9; color: #64748b; border: 1px solid #e2e8f0; }

        .dataTables_filter input { border: 1px solid var(--border-color); border-radius: 8px; padding: 8px 15px; font-size: 12px; width: 250px; outline: none; margin-right: 15px; }
    </style>
</head>
<body>

<div class="container-fluid">
    <!-- TOP HEADER -->
    <div class="top-bar">
        <h4>AURUM ANALYTICA DASHBOARD</h4>
        <div class="action-group">
            <button class="btn-clear" onclick="clearData()">🗑 CLEAR DATA</button>
            <div class="upload-card">
                <input type="file" id="excelUpload" class="form-control form-control-sm" accept=".xlsx, .xls, .csv" style="width: 180px;">
            </div>
        </div>
    </div>

    <!-- 4 BOX SLICER GRID (Styled like table) -->
    <div class="slicer-grid">
        <div class="slicer-card">
            <div class="slicer-header">Platform Filter</div>
            <div id="filter-platform" class="slicer-body"></div>
        </div>
        <div class="slicer-card">
            <div class="slicer-header">CPL Performance</div>
            <div id="filter-cpl" class="slicer-body"></div>
        </div>
        <div class="slicer-card">
            <div class="slicer-header">Qualification Tracker</div>
            <div id="filter-qual" class="slicer-body"></div>
        </div>
        <div class="slicer-card">
            <div class="slicer-header">Spent Type</div>
            <div id="filter-spent" class="slicer-body"></div>
        </div>
    </div>

    <!-- DATA TABLE CONTAINER -->
    <div class="table-container">
        <div class="table-responsive">
            <table id="campaignTable" class="table table-striped w-100">
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>
let table;
const targetHeaders = ["DRR", "CAMPAIGN", "CLIENT NAME", "PROJECT NAME", "PLATFORM", "CPL STATUS", "QUALIFICATION STATUS", "CREDIT ASSIGNED", "TOTAL CREDIT SPENT", "CREDIT ASSIGNED FOR", "LEADS DELIVERED", "PENDING LEADS", "FEEDBACK RECEIVED", "LEADS QUALIFIED", "TARGET CPL", "CURRENT CPL", "QUALIFICAITON", "SPENT TYPE"];

$(document).ready(function() {
    $('#tableHead').html("<tr>" + targetHeaders.map(h => `<th>${h}</th>`).join('') + "</tr>");
    
    table = $('#campaignTable').DataTable({
        "dom": 'frtip', 
        "pageLength": 15,
        "language": { "search": "", "searchPlaceholder": "Quick Search..." },
        "createdRow": function(row, data) {
            // CPL Status Badges
            if (data[5]) {
                let s = data[5].toString().toUpperCase();
                if (s.includes("OK")) $('td:eq(5)', row).html(`<span class="badge-pill status-ok">${s}</span>`);
                else if (s.includes("HIGH")) $('td:eq(5)', row).html(`<span class="badge-pill status-high">${s}</span>`);
            }

            // Qualification Status Badges
            if (data[6]) {
                let q = data[6].toString().toUpperCase();
                let cls = "qual-none";
                if (q === "GOOD") cls = "qual-good";
                else if (q === "OK") cls = "qual-ok";
                else if (q === "LOW") cls = "qual-low";
                $('td:eq(6)', row).html(`<span class="badge-pill ${cls}">${q}</span>`);
            }

            // Qualification % Format
            if (data[16] !== undefined && data[16] !== null) {
                let val = data[16].toString().replace('%', '');
                if (!isNaN(val) && val !== "") {
                    $('td:eq(16)', row).text(parseFloat(val).toFixed(2) + "%");
                    $('td:eq(16)', row).css({'font-weight': '700', 'color': '#2563eb'});
                }
            }
        }
    });

    loadStoredData();
    document.getElementById('excelUpload').addEventListener('change', handleFile, false);
});

function handleFile(e) {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = function(event) {
        const data = new Uint8Array(event.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });
        localStorage.setItem('dashboard_data', JSON.stringify(jsonData));
        processData(jsonData);
    };
    reader.readAsArrayBuffer(file);
}

function loadStoredData() {
    const saved = localStorage.getItem('dashboard_data');
    if (saved) processData(JSON.parse(saved));
}

function clearData() {
    if(confirm("Confirm: Clear memory and reset dashboard?")) {
        localStorage.removeItem('dashboard_data');
        location.reload();
    }
}

function processData(dataRows) {
    const tableData = [];
    const platforms = new Set();
    const cplStatus = new Set();
    const qualStatus = new Set();
    const spentType = new Set();

    for(let i = 1; i < dataRows.length; i++) {
        const row = dataRows[i];
        if(row && row.length > 0) {
            tableData.push(row);
            if(row[4]) platforms.add(row[4]);
            if(row[5]) cplStatus.add(row[5]);
            if(row[6]) qualStatus.add(row[6]);
            if(row[17]) spentType.add(row[17]);
        }
    }

    table.clear().rows.add(tableData).draw();
    updateSlicer('filter-platform', 4, platforms);
    updateSlicer('filter-cpl', 5, cplStatus);
    updateSlicer('filter-qual', 6, qualStatus);
    updateSlicer('filter-spent', 17, spentType);
}

function updateSlicer(containerId, colIdx, valueSet) {
    let html = `<button class="btn btn-slicer active" onclick="filterCol(this, ${colIdx}, '')">Show All</button>`;
    Array.from(valueSet).sort().forEach(val => {
        html += `<button class="btn btn-slicer" onclick="filterCol(this, ${colIdx}, '${val}')">${val}</button>`;
    });
    document.getElementById(containerId).innerHTML = html;
}

function filterCol(btn, idx, val) {
    $(btn).parent().find('.btn-slicer').removeClass('active');
    $(btn).addClass('active');
    table.column(idx).search(val ? `^${val}$` : '', true, false).draw();
}
</script>
</body>
</html>
